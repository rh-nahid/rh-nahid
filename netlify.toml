[build]
command = "npm run build"
publish = ".output/public"
functions = ".output/server"

[dev]
command = "npm run dev"
port = 5173

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm run build"
publish = ".output/public"

[context.deploy-preview]
command = "npm run build:dev"
publish = ".output/public"
